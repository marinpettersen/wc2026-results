name: Fetch World Cup results

on:
  schedule:
    # Tiap 30 menit (waktu UTC). GitHub cron minimal interval ~5 menit.
    # Selama turnamen ini lebih dari cukup karena kita cuma ambil laga yang SUDAH selesai.
    - cron: "*/30 * * * *"
  workflow_dispatch: {}        # bisa dijalankan manual dari tab Actions

# Diperlukan agar bisa git push hasil update results.json
permissions:
  contents: write

# Hindari dua run menimpa satu sama lain
concurrency:
  group: fetch-results
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch results
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          # Opsional override:
          # WC_LEAGUE_ID: "1"
          # WC_SEASON: "2026"
        run: node scripts/fetch-results.mjs

      - name: Validasi results.json
        run: node scripts/validate.mjs

      - name: Commit jika ada perubahan
        run: |
          if [[ -n "$(git status --porcelain results.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "chore: update results.json [skip ci]"
            git push
            echo "results.json diperbarui."
          else
            echo "Tidak ada perubahan."
          fi
