name: Fetch World Cup results

on:
  schedule:
    # Tiap 5 menit — untuk update live score saat turnamen berlangsung.
    # 288 run/hari × ~10 detik/run ≈ 48 menit/hari, masih dalam free tier 2000 mnt/bulan.
    - cron: "*/5 * * * *"
  workflow_dispatch: {}        # bisa dijalankan manual dari tab Actions

# Diperlukan agar bisa git push hasil update results.json
permissions:
  contents: write

# Hindari dua run menimpa satu sama lain
concurrency:
  group: fetch-results
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Smart scheduling check
        id: should_fetch
        run: |
          if node scripts/should-fetch.mjs; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch results
        if: steps.should_fetch.outputs.skip == 'false' || github.event_name == 'workflow_dispatch'
        env:
          HIGHLIGHTLY_KEY: ${{ secrets.HIGHLIGHTLY_KEY }}
          PROVIDER: ${{ secrets.PROVIDER }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
          # Opsional override:
          # WC_LEAGUE_ID: "1"
          # WC_SEASON: "2026"
        run: node scripts/fetch-results.mjs

      - name: Validasi results.json
        if: steps.should_fetch.outputs.skip == 'false' || github.event_name == 'workflow_dispatch'
        run: node scripts/validate.mjs

      - name: Commit jika ada perubahan
        run: |
          if [[ -n "$(git status --porcelain results.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add results.json
            git commit -m "chore: update results.json [skip ci]"
            git push
            echo "results.json diperbarui."
          else
            echo "Tidak ada perubahan."
          fi
