name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Juga trigger setelah fetch-results selesai (menangkap push results.json
  # yang pakai [skip ci] sehingga tidak men-trigger push event di atas)
  workflow_run:
    workflows: ["Fetch World Cup results"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

# Batalkan deploy lama kalau ada yang lebih baru
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Selalu ambil HEAD main supaya deployment mencerminkan commit terbaru
          # (penting saat trigger berasal dari workflow_run)
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Remove node_modules before packaging
        run: rm -rf node_modules

      - name: Configure Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
